<script>
// Global Variables
let tries = 0;
let lockedUntil = 0;
let currentMode = 'v1';
let codeDigits = [];
let isDragging = false;
let dragOffset = { x: 0, y: 0 };
let currentPosition = { x: 0, y: 0 };
let v1Unlocked = false;

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    currentPosition = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2
    };
    
    setupDrag();
    setupKeyboard();
    document.getElementById('toggleBtn').style.display = 'none';
});

// Setup Drag Functionality
function setupDrag() {
    const header = document.getElementById('floatingHeader');
    const container = document.getElementById('floatingContainer');
    
    header.addEventListener('touchstart', startDrag, { passive: false });
    header.addEventListener('mousedown', startDrag);
    
    function startDrag(e) {
        e.preventDefault();
        isDragging = true;
        
        const rect = container.getBoundingClientRect();
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        
        dragOffset = {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
        
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);
        
        container.style.opacity = '0.9';
    }
    
    function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        
        let newX = clientX - dragOffset.x;
        let newY = clientY - dragOffset.y;
        
        const containerWidth = container.offsetWidth;
        const containerHeight = container.offsetHeight;
        
        newX = Math.max(10, Math.min(window.innerWidth - containerWidth - 10, newX));
        newY = Math.max(10, Math.min(window.innerHeight - containerHeight - 10, newY));
        
        container.style.left = newX + 'px';
        container.style.top = newY + 'px';
        container.style.transform = 'none';
        
        currentPosition = { x: newX, y: newY };
    }
    
    function stopDrag() {
        isDragging = false;
        container.style.opacity = '1';
        
        document.removeEventListener('mousemove', drag);
        document.removeEventListener('touchmove', drag);
        document.removeEventListener('mouseup', stopDrag);
        document.removeEventListener('touchend', stopDrag);
    }
}

// Setup Keyboard Events
function setupKeyboard() {
    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') {
            addDigit(parseInt(e.key));
        } else if (e.key === 'Backspace' || e.key === 'Delete') {
            clearDigits();
        } else if (e.key === 'Enter') {
            executeHack();
        } else if (e.key === 'Escape') {
            hideFloating();
        }
    });
}

// Unlock System
function unlock() {
    if (Date.now() < lockedUntil) {
        document.getElementById('lockMsg').innerText = `⛔ LOCKED (${Math.ceil((lockedUntil - Date.now()) / 1000)}s)`;
        return;
    }
    
    const password = document.getElementById('password');
    const lockMsg = document.getElementById('lockMsg');
    const lock = document.getElementById('lock');
    
    if (password.value === "2026CKLOTTERYHACK") {
        lock.style.display = 'none';
        showNotification('SYSTEM UNLOCKED', 'success');
        document.getElementById('toggleBtn').style.display = 'flex';
    } else {
        tries++;
        lockMsg.innerText = `❌ ACCESS DENIED (${tries}/3)`;
        password.style.borderColor = '#ff00ff';
        password.style.animation = 'shake 0.5s';
        
        if (tries >= 3) {
            lockedUntil = Date.now() + 30000;
            tries = 0;
            lockMsg.innerText = '🔒 SYSTEM LOCKED 30s';
            setTimeout(() => {
                lockMsg.innerText = '';
                password.style.borderColor = '#00ffff';
            }, 30000);
        }
        
        setTimeout(() => {
            password.style.animation = '';
        }, 500);
    }
}

// V1 Password Modal Functions
function openV1Modal() {
    document.getElementById('v1PasswordModal').style.display = 'flex';
    document.getElementById('v1PasswordInput').focus();
}

function closeV1Modal() {
    document.getElementById('v1PasswordModal').style.display = 'none';
    document.getElementById('v1PasswordInput').value = '';
    document.getElementById('v1PasswordMsg').innerText = '';
    
    // Deselect V1 if not unlocked
    if (!v1Unlocked && currentMode === 'v1') {
        currentMode = 'v2';
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.mode === 'v2') {
                btn.classList.add('active');
            }
        });
    }
}

function verifyV1Password() {
    const v1Pass = document.getElementById('v1PasswordInput').value;
    const msg = document.getElementById('v1PasswordMsg');
    
    if (v1Pass === "2026VVIPCK") {
        v1Unlocked = true;
        msg.innerText = '✅ V1 UNLOCKED!';
        msg.style.color = '#00ffaa';
        showNotification('V1 MODE UNLOCKED', 'success');
        
        setTimeout(() => {
            closeV1Modal();
            // Update V1 button style
            document.querySelector('[data-mode="v1"]').classList.remove('v1-locked');
        }, 1000);
    } else {
        msg.innerText = '❌ INCORRECT PASSWORD';
        msg.style.color = '#ff4444';
        document.getElementById('v1PasswordInput').style.borderColor = '#ff4444';
        document.getElementById('v1PasswordInput').style.animation = 'shake 0.5s';
        
        setTimeout(() => {
            document.getElementById('v1PasswordInput').style.animation = '';
        }, 500);
    }
}

// Floating Interface Controls
function toggleFloating() {
    const container = document.getElementById('floatingContainer');
    const miniControls = document.getElementById('miniControls');
    
    if (container.style.display === 'none' || !container.style.display) {
        container.style.display = 'flex';
        container.style.left = currentPosition.x + 'px';
        container.style.top = currentPosition.y + 'px';
        container.style.transform = 'none';
        
        setTimeout(() => {
            miniControls.style.opacity = '1';
        }, 300);
        
        document.getElementById('toggleBtn').innerHTML = '<i class="fas fa-times"></i>';
        showNotification('HACK INTERFACE ACTIVE', 'info');
    } else {
        hideFloating();
    }
}

function hideFloating() {
    const container = document.getElementById('floatingContainer');
    const miniControls = document.getElementById('miniControls');
    
    container.style.display = 'none';
    miniControls.style.opacity = '0';
    
    document.getElementById('toggleBtn').innerHTML = '<i class="fas fa-bolt"></i>';
}

// Code Input Functions
function addDigit(digit) {
    if (codeDigits.length < 4) {
        codeDigits.push(digit);
        updateCodeDisplay();
        
        const buttons = document.querySelectorAll('.num-btn');
        buttons.forEach(btn => {
            if (btn.textContent == digit) {
                btn.style.background = '#00ffff';
                btn.style.color = '#000';
                setTimeout(() => {
                    btn.style.background = '';
                    btn.style.color = '';
                }, 150);
            }
        });
    }
}

function clearDigits() {
    codeDigits = [];
    updateCodeDisplay();
    
    const clearBtn = document.querySelector('.num-btn.clear');
    clearBtn.style.background = '#ff00ff';
    clearBtn.style.color = '#000';
    setTimeout(() => {
        clearBtn.style.background = '';
        clearBtn.style.color = '';
    }, 150);
}

function updateCodeDisplay() {
    const display = document.getElementById('codeDisplay');
    let displayText = '';
    
    for (let i = 0; i < 4; i++) {
        if (codeDigits[i] !== undefined) {
            displayText += codeDigits[i];
        } else {
            displayText += '_';
        }
    }
    
    display.textContent = displayText;
}

// Mode Selection
function selectMode(mode) {
    if (mode === 'v1' && !v1Unlocked) {
        openV1Modal();
        return;
    }
    
    currentMode = mode;
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.mode === mode) {
            btn.classList.add('active');
        }
    });
    
    showNotification(`MODE ${mode.toUpperCase()} SELECTED`, 'info');
}

// Execute Hack
function executeHack() {
    if (codeDigits.length !== 4) {
        showFloatingResult('ENTER 4 DIGITS', 'error');
        return;
    }
    
    if (currentMode === 'v1' && !v1Unlocked) {
        openV1Modal();
        return;
    }
    
    updateSteps(1);
    showFloatingResult('>>> SCANNING...', 'process');
    
    setTimeout(() => {
        updateSteps(2);
        showFloatingResult('>>> ANALYZING DATA...', 'process');
        
        setTimeout(() => {
            const result = calculateResult();
            updateSteps(3);
            showFloatingResult(result, 'result');
            
            const hackBtn = document.querySelector('.hack-btn');
            hackBtn.style.background = 'linear-gradient(135deg, #ff00ff, #00ffff)';
            hackBtn.style.color = '#000';
            setTimeout(() => {
                hackBtn.style.background = 'linear-gradient(135deg, #004466, #00ffff)';
                hackBtn.style.color = '#000';
            }, 1000);
            
            document.getElementById('miniControls').style.opacity = '1';
        }, 800);
    }, 700);
}

// Update Steps
function updateSteps(step) {
    for (let i = 1; i <= 3; i++) {
        const stepElement = document.getElementById(`floatingStep${i}`);
        if (i <= step) {
            stepElement.classList.add('active');
        } else {
            stepElement.classList.remove('active');
        }
    }
}

// Calculate Result
function calculateResult() {
    const digits = codeDigits;
    
    if (currentMode === 'v1') {
        return logicV1(digits);
    } else if (currentMode === 'v2') {
        return logicV2(digits);
    } else {
        return logicV3(digits);
    }
}

// Hack Logics
function logicV1(d) {
    for (let i = 0; i < 3; i++) {
        if (d[i] !== d[i + 1]) {
            return d[i + 1] >= 5 ? "BIG 🔴" : "SMALL 🔵";
        }
    }
    return fallback(d, false);
}

function logicV2(d) {
    for (let i = 3; i > 0; i--) {
        if (d[i] !== d[i - 1]) {
            return d[i - 1] >= 5 ? "BIG 🔴" : "SMALL 🔵";
        }
    }
    return fallback(d, true);
}

function logicV3(d) {
    let score = 0;
    d.forEach(n => n >= 5 ? score += 2 : score -= 2);
    
    for (let i = 0; i < 3; i++) {
        if (d[i + 1] > d[i]) score++;
        else if (d[i + 1] < d[i]) score--;
    }
    
    if (d[3] > d[2]) score += 2;
    if (d[3] < d[2]) score -= 2;
    
    const result = score >= 0 ? "BIG 🔴" : "SMALL 🔵";
    const confidence = Math.min(95, Math.abs(score) * 10 + 55);
    
    return `${result} ${confidence}%`;
}

function fallback(d, reverse) {
    const bigCount = d.filter(n => n >= 5).length;
    let result = bigCount >= 3 ? "BIG 🔴" : "SMALL 🔵";
    
    if (reverse) {
        result = result.includes("BIG") ? "SMALL 🔵" : "BIG 🔴";
    }
    
    return result;
}

// Show Result with Animation
function showFloatingResult(text, type) {
    const resultElement = document.getElementById('floatingResult');
    
    resultElement.textContent = '';
    resultElement.className = '';
    
    if (type === 'error') {
        resultElement.style.color = '#ff4444';
        resultElement.classList.add('shake');
    } else if (type === 'process') {
        resultElement.style.color = '#00aaff';
    } else {
        resultElement.style.color = '#ff00ff';
        resultElement.classList.add('pulse');
    }
    
    let i = 0;
    const typing = setInterval(() => {
        resultElement.textContent += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(typing);
        }
    }, 30);
}

// Quick Actions
function quickAction(action) {
    switch(action) {
        case 'refresh':
            showNotification('SYSTEM REFRESHED', 'info');
            codeDigits = [];
            updateCodeDisplay();
            updateSteps(0);
            showFloatingResult('⚡ STANDING BY ⚡', 'result');
            break;
            
        case 'hide':
            document.querySelector('iframe').style.opacity = 
                document.querySelector('iframe').style.opacity === '0.2' ? '1' : '0.2';
            showNotification('PAGE VISIBILITY TOGGLED', 'info');
            break;
            
        case 'info':
            alert('CK LOTTERY HACK V5\n2026 ELITE EDITION\n\n🔹 V1: Password Protected\n🔹 Drag header to move\n🔹 Enter 4 digits & execute');
            break;
    }
}

// Notification System
function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${type === 'error' ? '#330022' : type === 'success' ? '#002233' : '#112233'};
        color: ${type === 'error' ? '#ff88aa' : type === 'success' ? '#88ffaa' : '#88ccff'};
        border: 2px solid ${type === 'error' ? '#ff44aa' : type === 'success' ? '#00ffaa' : '#00aaff'};
        padding: 15px 20px;
        border-radius: 15px;
        z-index: 100000;
        font-size: 15px;
        max-width: 300px;
        transform: translateX(150%);
        transition: transform 0.3s ease;
        box-shadow: 0 5px 20px rgba(0,255,255,0.3);
        font-weight: bold;
    `;
    
    notification.innerHTML = `
        <i class="fas fa-${type === 'error' ? 'skull' : type === 'success' ? 'crown' : 'bolt'}"></i>
        ${message}
    `;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.transform = 'translateX(0)';
    }, 10);
    
    setTimeout(() => {
        notification.style.transform = 'translateX(150%)';
        setTimeout(() => {
            if (document.body.contains(notification)) {
                document.body.removeChild(notification);
            }
        }, 300);
    }, 3000);
}

// Enter key support
document.getElementById('password').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') {
        unlock();
    }
});

document.getElementById('v1PasswordInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') {
        verifyV1Password();
    }
});
